{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-5">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 72px; height: 72px;">
                        <i class="bi bi-shield-lock-fill fs-1"></i>
                    </div>
                    <h3 class="fw-bold text-dark">Acceso Restringido</h3>
                    <p class="text-muted small">Ingrese sus credenciales autorizadas para acceder al portal HHHA.</p>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="alert alert-danger border-0 small d-flex align-items-center mb-4">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        Usuario o contraseña incorrectos.
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label small fw-bold text-uppercase text-muted">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control border-start-0 ps-0" placeholder="Nombre de usuario">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label small fw-bold text-uppercase text-muted">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-key"></i></span>
                            <input type="password" name="password" required id="id_password" class="form-control border-start-0 ps-0" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                        Ingresar al Sistema <i class="bi bi-box-arrow-in-right ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    }
    .form-control:focus {
        box-shadow: none;
        border-color: #dee2e6;
    }
    .input-group-text {
        border-color: #dee2e6;
    }
</style>
{% endblock %}
