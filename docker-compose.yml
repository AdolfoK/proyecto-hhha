version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=hhha_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin123

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 hospital_hhha.wsgi:application"
    volumes:
      - .:/app
    ports:
      - "80:8000"
    environment:
      - DB_NAME=hhha_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_DEBUG=False
      # Credenciales de Azure (Nube B) - RELLENAR SOLO EN EL SERVIDOR
      - AZURE_ACCOUNT_NAME=tu_cuenta_azure
      - AZURE_ACCOUNT_KEY=tu_clave_azure
    depends_on:
      - db

volumes:
  postgres_data:
